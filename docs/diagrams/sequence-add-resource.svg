<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700">
  <defs>
    <style>
      .actor { fill: #1a1f35; stroke: #4a90e2; stroke-width: 2; }
      .lifeline { stroke: #4a90e2; stroke-width: 1; stroke-dasharray: 5,5; }
      .text { fill: #ffffff; font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .label { fill: #a0aec0; font-family: Arial, sans-serif; font-size: 11px; }
      .arrow { stroke: #4a90e2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .return-arrow { stroke: #68d391; stroke-width: 2; fill: none; marker-end: url(#return-arrowhead); stroke-dasharray: 3,3; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a90e2" />
    </marker>
    <marker id="return-arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#68d391" />
    </marker>
  </defs>

  <!-- Actors -->
  <!-- User -->
  <rect class="actor" x="30" y="20" width="120" height="50" rx="5"/>
  <text class="text" x="90" y="50">User (Browser)</text>
  <line class="lifeline" x1="90" y1="70" x2="90" y2="680"/>

  <!-- Client UI -->
  <rect class="actor" x="200" y="20" width="120" height="50" rx="5"/>
  <text class="text" x="260" y="45">Client UI</text>
  <text class="text" x="260" y="60">(Next.js)</text>
  <line class="lifeline" x1="260" y1="70" x2="260" y2="680"/>

  <!-- Server -->
  <rect class="actor" x="380" y="20" width="140" height="50" rx="5"/>
  <text class="text" x="450" y="45">Server</text>
  <text class="text" x="450" y="60">(Next.js API)</text>
  <line class="lifeline" x1="450" y1="70" x2="450" y2="680"/>

  <!-- LinkPreview/AI -->
  <rect class="actor" x="580" y="20" width="140" height="50" rx="5"/>
  <text class="text" x="650" y="45">LinkPreview/</text>
  <text class="text" x="650" y="60">AI Service</text>
  <line class="lifeline" x1="650" y1="70" x2="650" y2="680"/>

  <!-- Firestore -->
  <rect class="actor" x="780" y="20" width="120" height="50" rx="5"/>
  <text class="text" x="840" y="50">Firestore</text>
  <line class="lifeline" x1="840" y1="70" x2="840" y2="680"/>

  <!-- Sequence Steps -->
  
  <!-- 1. User inputs link -->
  <path class="arrow" d="M 90 100 L 260 100"/>
  <text class="label" x="175" y="95">1. Input link, click "Enrich"</text>

  <!-- 2. POST /api/enrich -->
  <path class="arrow" d="M 260 140 L 450 140"/>
  <text class="label" x="355" y="135">2. POST /api/enrich { url }</text>

  <!-- 3. Extract metadata -->
  <path class="arrow" d="M 450 180 L 650 180"/>
  <text class="label" x="550" y="175">3. Extract metadata</text>
  <text class="label" x="550" y="190">via link-preview</text>

  <!-- 4. Return metadata -->
  <path class="return-arrow" d="M 650 220 L 450 220"/>
  <text class="label" x="550" y="215">4. metadata (title,</text>
  <text class="label" x="550" y="230">description, favicon)</text>

  <!-- 5. Return to client -->
  <path class="return-arrow" d="M 450 260 L 260 260"/>
  <text class="label" x="355" y="255">5. metadata</text>

  <!-- 6. Display in form -->
  <path class="return-arrow" d="M 260 300 L 90 300"/>
  <text class="label" x="175" y="295">6. Display enriched data</text>

  <!-- 7. User submits -->
  <path class="arrow" d="M 90 340 L 260 340"/>
  <text class="label" x="175" y="335">7. Submit form</text>

  <!-- 8. POST /api/resources -->
  <path class="arrow" d="M 260 380 L 450 380"/>
  <text class="label" x="355" y="375">8. POST /api/resources</text>
  <text class="label" x="355" y="390">{ user_id, title, link, note, tag }</text>

  <!-- 9. Write to Firestore -->
  <path class="arrow" d="M 450 430 L 840 430"/>
  <text class="label" x="645" y="425">9. Write resource doc &amp;</text>
  <text class="label" x="645" y="440">membership (transaction)</text>

  <!-- 10. Acknowledge -->
  <path class="return-arrow" d="M 840 470 L 450 470"/>
  <text class="label" x="645" y="465">10. ack</text>

  <!-- 11. Success to client -->
  <path class="return-arrow" d="M 450 510 L 260 510"/>
  <text class="label" x="355" y="505">11. success</text>

  <!-- 12. Show confirmation -->
  <path class="return-arrow" d="M 260 550 L 90 550"/>
  <text class="label" x="175" y="545">12. Show confirmation</text>

  <!-- Activation boxes -->
  <rect fill="#2d3748" x="85" y="95" width="10" height="15"/>
  <rect fill="#2d3748" x="255" y="135" width="10" height="130"/>
  <rect fill="#2d3748" x="445" y="175" width="10" height="100"/>
  <rect fill="#2d3748" x="645" y="175" width="10" height="50"/>
  <rect fill="#2d3748" x="255" y="335" width="10" height="25"/>
  <rect fill="#2d3748" x="255" y="375" width="10" height="145"/>
  <rect fill="#2d3748" x="445" y="375" width="10" height="145"/>
  <rect fill="#2d3748" x="835" y="425" width="10" height="50"/>
</svg>