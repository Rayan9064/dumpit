<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <defs>
    <style>
      .actor { fill: #1a1f35; stroke: #4a90e2; stroke-width: 2; }
      .lifeline { stroke: #4a90e2; stroke-width: 1; stroke-dasharray: 5,5; }
      .text { fill: #ffffff; font-family: Arial, sans-serif; font-size: 13px; text-anchor: middle; }
      .label { fill: #a0aec0; font-family: Arial, sans-serif; font-size: 11px; }
      .arrow { stroke: #4a90e2; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .return-arrow { stroke: #68d391; stroke-width: 2; fill: none; marker-end: url(#return-arrowhead); stroke-dasharray: 3,3; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a90e2" />
    </marker>
    <marker id="return-arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#68d391" />
    </marker>
  </defs>

  <!-- Actors -->
  <!-- User -->
  <rect class="actor" x="30" y="20" width="120" height="50" rx="5"/>
  <text class="text" x="90" y="50">User (Browser)</text>
  <line class="lifeline" x1="90" y1="70" x2="90" y2="480"/>

  <!-- Client UI -->
  <rect class="actor" x="200" y="20" width="120" height="50" rx="5"/>
  <text class="text" x="260" y="45">Client UI</text>
  <text class="text" x="260" y="60">(Next.js)</text>
  <line class="lifeline" x1="260" y1="70" x2="260" y2="480"/>

  <!-- Server -->
  <rect class="actor" x="380" y="20" width="140" height="50" rx="5"/>
  <text class="text" x="450" y="45">Server</text>
  <text class="text" x="450" y="60">(Next.js API)</text>
  <line class="lifeline" x1="450" y1="70" x2="450" y2="480"/>

  <!-- Enrich Service -->
  <rect class="actor" x="580" y="20" width="140" height="50" rx="5"/>
  <text class="text" x="650" y="45">Enrich Service</text>
  <text class="text" x="650" y="60">(link-preview)</text>
  <line class="lifeline" x1="650" y1="70" x2="650" y2="480"/>

  <!-- External APIs -->
  <rect class="actor" x="780" y="20" width="140" height="50" rx="5"/>
  <text class="text" x="850" y="45">External APIs</text>
  <text class="text" x="850" y="60">(Gemini/AI)</text>
  <line class="lifeline" x1="850" y1="70" x2="850" y2="480"/>

  <!-- Sequence Steps -->
  
  <!-- 1. User pastes URL -->
  <path class="arrow" d="M 90 100 L 260 100"/>
  <text class="label" x="175" y="95">1. Paste URL, blur/click</text>

  <!-- 2. POST /api/enrich -->
  <path class="arrow" d="M 260 140 L 450 140"/>
  <text class="label" x="355" y="135">2. POST /api/enrich</text>
  <text class="label" x="355" y="150">{ url }</text>

  <!-- 3. Call enrich service -->
  <path class="arrow" d="M 450 180 L 650 180"/>
  <text class="label" x="550" y="175">3. Extract metadata</text>

  <!-- 4. Fetch from URL -->
  <path class="arrow" d="M 650 220 L 850 220"/>
  <text class="label" x="750" y="215">4. Fetch URL content</text>
  <text class="label" x="750" y="230">(optional AI tags)</text>

  <!-- 5. Return parsed data -->
  <path class="return-arrow" d="M 850 260 L 650 260"/>
  <text class="label" x="750" y="255">5. HTML/metadata</text>

  <!-- 6. Return to server -->
  <path class="return-arrow" d="M 650 300 L 450 300"/>
  <text class="label" x="550" y="295">6. Parsed data</text>
  <text class="label" x="550" y="310">(title, description,</text>
  <text class="label" x="550" y="325">favicon, tag)</text>

  <!-- 7. Return to client -->
  <path class="return-arrow" d="M 450 350 L 260 350"/>
  <text class="label" x="355" y="345">7. Enriched metadata</text>

  <!-- 8. Display to user -->
  <path class="return-arrow" d="M 260 390 L 90 390"/>
  <text class="label" x="175" y="385">8. Auto-fill form fields</text>

  <!-- Activation boxes -->
  <rect fill="#2d3748" x="85" y="95" width="10" height="15"/>
  <rect fill="#2d3748" x="255" y="135" width="10" height="225"/>
  <rect fill="#2d3748" x="445" y="135" width="10" height="225"/>
  <rect fill="#2d3748" x="645" y="175" width="10" height="135"/>
  <rect fill="#2d3748" x="845" y="215" width="10" height="50"/>
</svg>